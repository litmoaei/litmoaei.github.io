<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LITMOAEI | The Calm Madness</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --bg: #050505; --text: #F2F2F2; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; text-align: center; overflow-x: hidden; }
        
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        
        /* This box crops your photo and turns the black ink into GOLD */
        .logo-container {
            width: 280px; 
            height: 280px; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            /* Magic Filter: Turns the White background Black and the Black logo Gold */
            filter: invert(1) sepia(1) saturate(5) hue-rotate(10deg) brightness(1.1);
        }
        .logo-container img { width: 130%; height: auto; }

        h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(50px, 12vw, 100px); 
            color: var(--gold); 
            margin: -30px 0 0 0; 
            letter-spacing: 8px;
            font-weight: 700;
        }
        p { letter-spacing: 10px; font-size: 0.65rem; color: #666; text-transform: uppercase; margin-top: 25px; line-height: 2; }
        
        .btn {
            margin-top: 50px; padding: 18px 45px;
            background: none; border: 1px solid var(--gold);
            color: var(--gold); text-decoration: none;
            letter-spacing: 4px; font-size: 0.7rem; transition: 0.4s;
            text-transform: uppercase;
        }
        .btn:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>

<div class="hero">
    <div class="logo-container">
        <img src="logo.jpg" alt="L">
    </div>
    <h1>ITMOAEI</h1>
    <p>Lost in the madness<br>of an endless insanity</p>
    <a href="#" class="btn">Explore the Madness</a>
</div>

</body>
</html>
