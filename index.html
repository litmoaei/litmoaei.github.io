<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LITMOAEI | The Permanent Master Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@100;200;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* CORE RESET */
        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { background-color: #000; color: #fff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; line-height: 1.6; }

        /* HEADER & BRANDING */
        .header-wrapper { padding: 120px 20px; text-align: center; cursor: pointer; border-bottom: 1px solid #1a1a1a; }
        .main-logo { width: 500px; max-width: 90%; display: block; margin: 0 auto; filter: brightness(0.9); }
        .welcome-text { 
            font-family: 'Cinzel', serif; font-size: 3.5rem; margin-top: 40px; letter-spacing: 12px; text-transform: uppercase; 
            background: linear-gradient(to right, #ffffff, #b76e79, #d4af37);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900;
        }

        /* NAVIGATION */
        nav { width: 100%; padding: 40px 0; background: rgba(0, 0, 0, 0.95); position: sticky; top: 0; z-index: 999; border-bottom: 1px solid #222; }
        nav ul { display: flex; list-style: none; justify-content: center; gap: 30px; flex-wrap: wrap; }
        nav a { color: #fff; text-decoration: none; font-family: 'Cinzel', serif; font-size: 1.1rem; padding: 10px 15px; transition: all 0.4s ease; border: 1px solid transparent; cursor: pointer; }
        nav a:hover { color: #b76e79; border-bottom: 1px solid #b76e79; }

        /* SECTION MANAGEMENT */
        .page-section { display: none; padding: 40px 20px; min-height: 80vh; text-align: center; opacity: 0; transition: opacity 0.8s ease-in-out; }
        .page-section.active { display: block; opacity: 1; }

        /* ASSETS */
        .flush-img { width: 100%; max-width: 1100px; display: block; margin: 0 auto; border: none !important; }
        .statement-text { font-family: 'Cinzel', serif; font-size: 2.5rem; color: #b76e79; padding: 80px 20px; font-style: italic; max-width: 900px; margin: 0 auto; }
        
        @media (max-width: 600px) { .welcome-text { font-size: 2rem !important; } }
    </style>
</head>
<body>

    <header class="header-wrapper" onclick="showPage('home')">
        <img src="Logo.png" alt="Litmoaei" class="main-logo">
        <h1 class="welcome-text">WELCOME TO THE MADNESS</h1>
    </header>

    <nav>
        <ul>
            <li><a onclick="showPage('home')">⌂ HOME</a></li>
            <li><a onclick="showPage('mind')">THE MIND</a></li>
            <li><a onclick="showPage('pavement')">THE PAVEMENT</a></li>
            <li><a onclick="showPage('elixirs')">ELIXIRS</a></li>
            <li><a onclick="showPage('classics')">THE CLASSICS</a></li>
            <li><a onclick="showPage('nudes')">NUDE PAINTINGS</a></li>
            <li><a onclick="showPage('music')">MUSIC</a></li>
        </ul>
    </nav>

    <section id="home" class="page-section active">
        <div class="statement-text">"I got lost in the madness to find myself. So I ask, what about you?"</div>
        <img src="I got lost in the madness to find myself.jpeg" alt="The Madness" class="flush-img">
        <video autoplay muted loop playsinline class="flush-img" style="margin-top:20px;">
            <source src="THE MAD HALL, ART ROOM.mp4" type="video/mp4">
        </video>         <div style="margin-top: 50px; padding: 40px; text-align: center; font-family: 'Cinzel', serif; font-size: 1.2rem; color: #fff;">
            <p>The world was created as a gift to you.</p>
        </div>
    </section>

    <footer class="footer-section">
        <div class="footer-links">
            <a href="https://www.instagram.com/rony_willz" target="_blank">INSTAGRAM</a>
            <a href="https://www.youtube.com/@rony_willz" target="_blank">YOUTUBE</a>
            <a href="mailto:contact@litmoaei.com">EMAIL</a>
        </div>
        <p style="margin-top: 30px; font-size: 0.8rem; color: #444;">&copy; 2026 LITMOAEI. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
        function showPage(pageId) {
            // Hide all sections
            const sections = document.querySelectorAll('.page-section');
            sections.forEach(sec => {
                sec.style.display = 'none';
                sec.classList.remove('active');
            });
            
            // Show the target section
            const target = document.getElementById(pageId);
            if (target) {
                target.style.display = 'block';
                // Small timeout to allow display change before triggering opacity
                setTimeout(() => { target.classList.add('active'); }, 50);
            }
        }
    </script>
</body>
</html>
