<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSIC | LITMOAEI</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@100;200;400;700&display=swap" rel="stylesheet">
  
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000; color: #fff; font-family: 'Montserrat', sans-serif; line-height: 1.6; }
        
        .back-nav { padding: 40px 20px; text-align: center; }
        .back-nav a { color: #555; text-decoration: none; font-family: 'Cinzel', serif; font-size: 1rem; letter-spacing: 3px; transition: color 0.3s; }
        .back-nav a:hover { color: #b76e79; }

        .statement-text { font-family: 'Cinzel', serif; font-size: 2.5rem; color: #b76e79; padding: 40px 20px; text-align: center; font-style: italic; }
        
        .music-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
        .music-item { text-align: center; transition: transform 0.3s ease; }
        .music-item:hover { transform: scale(1.03); }
        .music-img { width: 100%; max-width: 100%; height: auto; border: 1px solid #1a1a1a; background: #0f0f0f; object-fit: contain; margin-bottom: 20px; }
        
        .listen-box { display: inline-block; background: rgba(0, 0, 0, 0.95); border: 2px solid #b76e79; padding: 14px 32px; font-family: 'Cinzel', serif; font-size: 1.15rem; color: #fff; text-decoration: none; transition: all 0.4s ease; cursor: pointer; letter-spacing: 1px; }
        .listen-box:hover { background: #b76e79; color: #000; }
    </style>
</head>
<body>

    <nav class="back-nav">
        <a href="index.html">← BACK TO THE MADNESS</a>
    </nav>

    <div class="statement-text">MUSIC</div>

    <section class="music-section">
        <div class="music-item">
            <img src="bed-of-lies.jpg" class="music-img" alt="bed of lies">
            <a href="https://youtu.be/VZEKBsaUB6E?si=LmucFtM_IzhY6Rik" class="listen-box" target="_blank">LISTEN</a>
        </div>
        <div class="music-item">
            <img src="enough tears to keep me cool in hell song.jpg" class="music-img" alt="enough tears to keep me cool in hell">
            <a href="https://youtu.be/Ru5tZlU-BBs?si=jFZE31i3VWzc5g-P" class="listen-box" target="_blank">LISTEN</a>
        </div>
        <div class="music-item">
            <img src="now-they-claim-to-know-me.jpg" class="music-img" alt="now-they-claim-to-know-me">
            <a href="https://youtu.be/WSdoRmeyK5Y?si=xWTIwNFv1itDQTEH" class="listen-box" target="_blank">LISTEN</a>
        </div>
        <div class="music-item">
            <img src="i-just-wanna-be-loved.jpg" class="music-img" alt="i just wanna be loved">
            <a href="https://youtu.be/9bdCD1KQ5kI?si=Ix-aEpxT4mR6xJUv" class="listen-box" target="_blank">LISTEN</a>
        </div>
        <div class="music-item">
            <img src="ooh-mama.JPG" class="music-img" alt="ooh mama">
            <a href="https://youtu.be/rzU01gN6pOs?si=fQvVl2uw9izQWI_L" class="listen-box" target="_blank">LISTEN</a>
        </div>
        <div class="music-item">
            <img src="dear-me.jpg" class="music-img" alt="dear me">
            <a href="https://youtu.be/0soD8dsNU94?si=Gl8OKFuKfPFbYsmf" class="listen-box" target="_blank">LISTEN</a>
        </div>
    </section>

</body>
</html>
