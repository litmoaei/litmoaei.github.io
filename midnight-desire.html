<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDNIGHT DESIRES | LITMOAEI</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@100;200;400;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }
        .back-nav {
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }
        .back-nav a {
            color: #fff;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            border: 1px solid #222;
            padding: 10px 20px;
            transition: all 0.3s ease;
        }
        .back-nav a:hover {
            background: rgba(183, 110, 121, 0.1);
            border-color: #b76e79;
        }

        /* HERO VIDEO - Full screen with proper aspect ratio handling */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            min-height: 700px;
            overflow: hidden;
        }
        .video-element {
            width: 100%;
            height: 100%;
            object-fit: cover;           /* Changed to 'contain' if you want zero cropping */
            object-position: center;
            display: block;
            background: #000;
            pointer-events: none;
        }
        .video-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.75) 45%, rgba(0,0,0,0.95) 75%);
            z-index: 5;
            pointer-events: none;
        }

        /* Text in top half */
        .hero-content {
            position: absolute;
            top: 18%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            max-width: 920px;
            padding: 0 20px;
            pointer-events: none;
        }
        .hero-content .statement-text {
            font-size: 3.4rem;
            margin-bottom: 8px;
            color: #fff;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.85);
            line-height: 1.05;
            font-weight: 700;
        }
        .hero-content .tagline {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            color: #b76e79;
            font-style: italic;
            text-shadow: 0 2px 15px rgba(183, 110, 121, 0.65);
        }

        /* Buttons floating on bottom half of video */
        .classic-hub {
            position: absolute;
            bottom: 18%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            gap: 90px;
            z-index: 15;
            pointer-events: auto;
        }
        .hub-btn {
            cursor: pointer;
            text-align: center;
            transition: transform 0.3s ease;
        }
        .hub-btn:hover {
            transform: scale(1.1);
        }
        .hub-icon {
            font-size: 5.5rem;
            display: block;
            margin-bottom: 10px;
        }

        /* Category Sections */
        .category-section {
            display: none;
        }
        .content-wrap {
            padding: 100px 20px;
            text-align: center;
        }
        .statement-text {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            color: #b76e79;
            font-style: italic;
            margin-bottom: 50px;
        }
        .gallery-wrap {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            padding: 20px;
            justify-items: center;
            margin-bottom: 80px;
        }
        .gallery-item {
            width: 100%;
            max-width: 400px;
            background: #0f0f0f;
            border: 1px solid #1a1a1a;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }
        .gallery-item img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }
        .btn-order {
            display: block;
            width: 100%;
            padding: 20px;
            border: 1px solid #b76e79;
            color: #fff;
            text-align: center;
            text-decoration: none;
            margin-top: 15px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            background: transparent;
        }
        .btn-order:hover {
            background: #b76e79;
            color: #000;
        }

        /* Payment Overlay */
        .overlay-dimmer {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 2000;
            overflow-y: auto;
            padding: 40px;
        }
        .payment-card {
            max-width: 900px;
            margin: 0 auto;
            border: 1px solid #b76e79;
            padding: 50px;
            text-align: left;
            background: #000;
        }
        .payment-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .currency-block {
            border: 1px solid #222;
            padding: 20px;
            background: #0a0a0a;
            font-size: 0.9rem;
        }
        .qr-container {
            text-align: center;
            margin-top: 30px;
            border: 1px solid #222;
            padding: 25px;
        }
        .qr-img {
            width: 180px;
            height: 180px;
            max-width: 100%;
            background: #fff;
            margin: 15px auto;
            padding: 10px;
        }
        .qr-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .security-warning {
            color: #b76e79;
            border: 1px solid #b76e79;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
            font-family: 'Cinzel';
            font-weight: bold;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .classic-hub { gap: 50px; bottom: 12%; }
            .hub-icon { font-size: 4.2rem; }
            .hero-content .statement-text { font-size: 2.6rem; }
        }
    </style>
</head>
<body>
    <!-- BACK NAV -->
    <nav class="back-nav">
        <a href="index.html">← BACK TO THE MADNESS</a>
    </nav>

    <!-- HERO VIDEO SECTION -->
    <section class="hero-section">
        <video class="video-element" id="hero-video" autoplay loop muted playsinline>
            <source src="midnight-desire.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="video-overlay"></div>

        <!-- Text - Top half -->
        <div class="hero-content">
            <h1 class="statement-text">MIDNIGHT DESIRES</h1>
            <p class="tagline">SHOW YOUR PARTNER WHAT MADNESS LOOKS LIKE</p>
        </div>

        <!-- For Him & For Her - Bottom half, fully clickable -->
        <div class="classic-hub">
            <div class="hub-btn" onclick="showCategory('him-section')">
                <span class="hub-icon">👔</span>
                <h3>FOR HIM</h3>
            </div>
            <div class="hub-btn" onclick="showCategory('her-section')">
                <span class="hub-icon">👗</span>
                <h3>FOR HER</h3>
            </div>
        </div>
    </section>

    <!-- FOR HIM -->
    <section id="him-section" class="content-wrap category-section">
        <h2 class="statement-text">FOR HIM</h2>
        <div class="bespoke-text" style="font-family:Cinzel; color:#888; margin-bottom:40px; font-style:italic;">
            Bespoke. Once selected, send your size and any unique specifications.
        </div>
        <div class="gallery-wrap">
            <!-- Your images here - unchanged -->
            <div class="gallery-item"><img src="m midnight desire.JPG"><button class="btn-order" onclick="openOrder('m midnight desire.JPG')">COMMISSION</button></div>
            <!-- ... rest of your For Him images ... -->
        </div>
    </section>

    <!-- FOR HER -->
    <section id="her-section" class="content-wrap category-section">
        <h2 class="statement-text">FOR HER</h2>
        <div class="bespoke-text" style="font-family:Cinzel; color:#888; margin-bottom:40px; font-style:italic;">
            Bespoke. Once selected, send your size and any unique specifications.
        </div>
        <div class="gallery-wrap">
            <!-- Your images here - unchanged -->
            <div class="gallery-item"><img src="f midnight desire.JPG"><button class="btn-order" onclick="openOrder('f midnight desire.JPG')">COMMISSION</button></div>
            <!-- ... rest of your For Her images ... -->
        </div>
    </section>

    <!-- Payment Overlay (unchanged) -->
    <div id="payment-overlay" class="overlay-dimmer">
        <!-- Your payment content here -->
    </div>

    <script>
        function initializeCategories() {
            document.querySelectorAll('.category-section').forEach(cat => {
                cat.style.display = 'none';
            });
        }

        function showCategory(categoryId) {
            document.querySelectorAll('.category-section').forEach(cat => {
                cat.style.display = 'none';
            });
            const selected = document.getElementById(categoryId);
            selected.style.display = 'block';
            selected.scrollIntoView({ behavior: 'smooth' });
        }

        function openOrder(pieceName) {
            const overlay = document.getElementById('payment-overlay');
            const title = document.getElementById('order-title');
            const link = document.getElementById('ig-commission-link');
            
            title.innerText = `COMMISSION: ${pieceName}`;
            const msg = `Hello, I would like to commission ${pieceName}.%0A%0ASize:%20_____%0AColor:%20_____%0ACustom%20Details:%20_____`;
            link.href = `https://ig.me/m/rony_willz?text=${msg}`;
            overlay.style.display = 'block';
        }

        function closeOrder() {
            document.getElementById('payment-overlay').style.display = 'none';
        }

        window.onload = function() {
            initializeCategories();
        };
    </script>
</body>
</html>
